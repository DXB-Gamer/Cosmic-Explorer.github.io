<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Binary Decoder</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #111510;
    --grid: rgba(255,255,255,0.03);
    --border: rgba(255,255,255,0.08);
    --muted: #666;
    --dim: #999;
    --text: #eceee8;
    --accent: #d4f06e;
    --accent-dim: rgba(212, 240, 110, 0.1);
    --chalk: #f2f0e8;
    --surface: #1a1e18;
    --btn-bg: #1e221c;
  }

  body.light {
    --bg: #f0f6f4;
    --grid: rgba(0,0,0,0.04);
    --border: rgba(0,100,80,0.15);
    --muted: #6a9a8a;
    --dim: #4a8070;
    --text: #0d2e28;
    --accent: #0a7a5a;
    --accent-dim: rgba(10, 122, 90, 0.1);
    --chalk: #0a2420;
    --surface: #e2f0ec;
    --btn-bg: #d8ece6;
  }

  body {
    background: var(--bg);
    background-image: linear-gradient(var(--grid) 1px, transparent 1px), linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size: 40px 40px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 2rem;
    transition: background-color 0.3s, color 0.3s;
  }

  .page { width: 100%; max-width: 580px; padding-top: 1rem; }

  /* top bar */
  .topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; }

  .title {
    font-family: 'Libre Baskerville', serif;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.15em;
    background: linear-gradient(90deg, #a67c00, #f5c842, #fde992, #f5c842, #a67c00);
    background-size: 300% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer 4s linear infinite;
  }

  @keyframes shimmer { 0% { background-position: 0% center; } 100% { background-position: 300% center; } }

  .theme-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    font-size: 16px;
    width: 34px; height: 34px;
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s;
    display: flex; align-items: center; justify-content: center;
  }
  .theme-btn:hover { color: var(--accent); border-color: var(--accent); }

  /* nav tabs */
  .nav-tabs {
    display: flex;
    gap: 0;
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    width: 100%;
    margin-bottom: 2.5rem;
  }

  .nav-tab {
    flex: 1;
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    padding: 9px 6px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    border-right: 1px solid var(--border);
  }
  .nav-tab:last-child { border-right: none; }
  .nav-tab.active { background: var(--accent-dim); color: var(--accent); }

  /* ── DECODER SECTION ── */
  .section { display: none; }
  .section.active { display: block; }

  .mode-row {
    display: flex; align-items: center;
    margin-bottom: 2.5rem;
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    width: fit-content;
  }

  .mode-btn {
    background: none; border: none;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 12px; letter-spacing: 0.08em;
    padding: 8px 20px; cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .mode-btn.active { background: var(--accent-dim); color: var(--accent); }
  .mode-divider { width: 1px; height: 34px; background: var(--border); }

  .swap-icon {
    background: none; border: none;
    color: var(--muted); font-size: 16px;
    padding: 6px 12px; cursor: pointer;
    transition: color 0.15s, transform 0.3s; line-height: 1;
  }
  .swap-icon:hover { color: var(--accent); transform: rotate(180deg); }

  .label {
    font-family: 'Libre Baskerville', serif;
    font-style: italic; font-size: 13px;
    color: var(--muted); margin-bottom: 0.6rem; letter-spacing: 0.02em;
  }

  .input-area { margin-bottom: 2.5rem; }

  input[type="text"] {
    width: 100%; background: none; border: none;
    border-bottom: 1px solid var(--border);
    color: var(--chalk);
    font-family: 'DM Mono', monospace;
    font-size: 44px; font-weight: 300; letter-spacing: 10px;
    padding: 0 0 14px 0; outline: none;
    transition: border-color 0.2s; caret-color: var(--accent);
  }
  input[type="text"]::placeholder { color: var(--border); }
  input[type="text"]:focus { border-bottom-color: rgba(212,240,110,0.4); }

  .err { font-size: 11px; color: #c06060; margin-top: 8px; min-height: 14px; letter-spacing: 0.05em; }

  .bits-strip { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 3rem; min-height: 46px; align-items: flex-start; }

  .bit-col { display: flex; flex-direction: column; align-items: center; gap: 5px; animation: popIn 0.15s ease both; }

  .bit {
    width: 42px; height: 42px; border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    font-size: 19px; font-weight: 400;
  }
  @keyframes popIn { from { transform: scale(0.6) translateY(6px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }
  .bit.one { background: var(--accent-dim); color: var(--accent); border: 1px solid rgba(212,240,110,0.25); }
  .bit.zero { background: rgba(128,128,128,0.04); color: var(--muted); border: 1px solid var(--border); }

  .bit-power { font-size: 11px; color: var(--muted); }
  .bit-power.active { color: var(--accent); }

  .result-label { font-family: 'Libre Baskerville', serif; font-style: italic; font-size: 13px; color: var(--muted); margin-bottom: 0.5rem; letter-spacing: 0.02em; display: none; }

  .result-wrap { text-align: left; margin-bottom: 1.5rem; padding: 2rem 0; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); display: none; position: relative; }

  .result-num { font-family: 'Libre Baskerville', serif; font-size: 100px; font-weight: 400; color: var(--accent); line-height: 1; letter-spacing: -3px; }
  .result-binary { font-family: 'DM Mono', monospace; font-size: 48px; font-weight: 300; color: var(--accent); letter-spacing: 8px; line-height: 1; word-break: break-all; }

  .copy-btn {
    position: absolute; top: 1.5rem; right: 0;
    background: none; border: 1px solid var(--border);
    border-radius: 5px; color: var(--muted);
    font-family: 'DM Mono', monospace; font-size: 11px;
    padding: 5px 10px; cursor: pointer;
    transition: color 0.2s, border-color 0.2s;
  }
  .copy-btn:hover { color: var(--accent); border-color: var(--accent); }
  .copy-btn.copied { color: var(--accent); border-color: var(--accent); }

  .breakdown { font-family: 'DM Mono', monospace; font-size: 14px; color: var(--dim); margin-bottom: 3rem; }
  .sum-expr { display: flex; align-items: center; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; }
  .sum-val { color: var(--chalk); font-size: 16px; }
  .sum-op { color: var(--muted); font-size: 14px; }
  .sum-eq { width: 100%; height: 1px; background: var(--border); margin: 6px 0 10px; }
  .sum-total { color: var(--accent); font-size: 18px; font-weight: 500; }
  .empty-hint { font-size: 13px; color: var(--border); letter-spacing: 6px; }

  /* ── QUIZ SECTION ── */
  .quiz-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; }
  .quiz-stat { text-align: center; }
  .quiz-stat-val { font-size: 28px; font-weight: 500; color: var(--accent); line-height: 1; }
  .quiz-stat-label { font-size: 10px; color: var(--muted); letter-spacing: 0.1em; margin-top: 3px; }

  .timer-ring { position: relative; width: 64px; height: 64px; }
  .timer-ring svg { transform: rotate(-90deg); }
  .timer-ring circle { fill: none; stroke-width: 3; }
  .timer-bg { stroke: var(--border); }
  .timer-fg { stroke: var(--accent); stroke-linecap: round; transition: stroke-dashoffset 1s linear, stroke 0.3s; }
  .timer-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); font-size: 14px; font-weight: 500; color: var(--text); }

  .quiz-question { margin-bottom: 1.5rem; }
  .quiz-q-label { font-family: 'Libre Baskerville', serif; font-style: italic; font-size: 13px; color: var(--muted); margin-bottom: 0.5rem; }
  .quiz-q-num { font-family: 'DM Mono', monospace; font-size: 52px; font-weight: 300; color: var(--chalk); letter-spacing: 6px; }

  .quiz-input-row { display: flex; gap: 10px; align-items: flex-end; margin-bottom: 1rem; }
  .quiz-input {
    flex: 1; background: none; border: none;
    border-bottom: 1px solid var(--border);
    color: var(--chalk);
    font-family: 'DM Mono', monospace;
    font-size: 36px; font-weight: 300; letter-spacing: 6px;
    padding: 0 0 10px 0; outline: none;
    caret-color: var(--accent);
  }
  .quiz-input:focus { border-bottom-color: rgba(212,240,110,0.4); }

  .quiz-submit {
    background: var(--accent-dim); border: 1px solid rgba(212,240,110,0.3);
    border-radius: 6px; color: var(--accent);
    font-family: 'DM Mono', monospace; font-size: 12px;
    padding: 10px 18px; cursor: pointer;
    transition: background 0.15s;
  }
  .quiz-submit:hover { background: rgba(212,240,110,0.2); }

  .quiz-feedback { font-size: 14px; min-height: 20px; margin-bottom: 1.5rem; }
  .quiz-feedback.correct { color: var(--accent); }
  .quiz-feedback.wrong { color: #e06060; }

  .quiz-start-btn {
    width: 100%; padding: 14px;
    background: var(--accent-dim); border: 1px solid rgba(212,240,110,0.3);
    border-radius: 6px; color: var(--accent);
    font-family: 'DM Mono', monospace; font-size: 14px; letter-spacing: 0.1em;
    cursor: pointer; transition: background 0.15s;
  }
  .quiz-start-btn:hover { background: rgba(212,240,110,0.2); }

  .quiz-over { text-align: center; padding: 2rem 0; }
  .quiz-over-score { font-family: 'Libre Baskerville', serif; font-size: 72px; color: var(--accent); line-height: 1; }
  .quiz-over-label { font-size: 12px; color: var(--muted); margin: 0.5rem 0 2rem; letter-spacing: 0.1em; }

  /* ── CALCULATOR SECTION ── */
  .calc-title {
    font-family: 'Libre Baskerville', serif;
    font-size: 18px; font-weight: 700;
    letter-spacing: 0.12em; margin-bottom: 1.5rem;
    background: linear-gradient(90deg, #a67c00, #f5c842, #fde992, #f5c842, #a67c00);
    background-size: 300% auto;
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    animation: shimmer 4s linear infinite;
  }

  .calc-mode-row { display: flex; gap: 0; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; width: fit-content; margin-bottom: 1.5rem; }
  .calc-mode-btn { background: none; border: none; color: var(--muted); font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.08em; padding: 7px 16px; cursor: pointer; transition: background 0.15s, color 0.15s; }
  .calc-mode-btn.active { background: var(--accent-dim); color: var(--accent); }

  .calc-display {
    background: var(--surface);
    border: 1px solid var(--border); border-radius: 6px;
    padding: 1rem 1.2rem; margin-bottom: 1rem; min-height: 70px;
    display: flex; flex-direction: column; justify-content: flex-end; align-items: flex-end;
  }
  .calc-expr { font-size: 13px; color: var(--muted); min-height: 18px; word-break: break-all; text-align: right; }
  .calc-val { font-size: 36px; font-weight: 300; color: var(--chalk); letter-spacing: 2px; word-break: break-all; text-align: right; }

  .calc-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 1rem; }
  .calc-btn {
    background: var(--btn-bg); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text);
    font-family: 'DM Mono', monospace; font-size: 16px;
    padding: 14px 6px; cursor: pointer;
    transition: background 0.1s, color 0.1s;
  }
  .calc-btn:hover { background: var(--surface); }
  .calc-btn:active { transform: scale(0.96); }
  .calc-btn.op { color: var(--accent); }
  .calc-btn.eq { background: var(--accent-dim); color: var(--accent); border-color: rgba(212,240,110,0.3); }
  .calc-btn.eq:hover { background: rgba(212,240,110,0.2); }
  .calc-btn.wide { grid-column: span 2; }
  .calc-btn.dim { color: var(--muted); }

  .calc-also { font-size: 11px; color: var(--muted); text-align: right; margin-top: -0.5rem; min-height: 16px; font-style: italic; font-family: 'Libre Baskerville', serif; }
</style>
</head>
<body>
<div class="page">

  <div class="topbar">
    <h1 class="title">[|] Binary Number Decoder [|]</h1>
    <button class="theme-btn" id="themeBtn" onclick="toggleTheme()" title="Toggle theme">☀</button>
  </div>

  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showTab('decoder')">Decoder</button>
    <button class="nav-tab" onclick="showTab('quiz')">Quiz</button>
    <button class="nav-tab" onclick="showTab('calc')">Calculator</button>
  </div>

  <!-- ══ DECODER ══ -->
  <div class="section active" id="tab-decoder">
    <div class="mode-row">
      <button class="mode-btn active" id="btnBin" onclick="setMode('bin')">Binary → Decimal</button>
      <div class="mode-divider"></div>
      <button class="swap-icon" onclick="setMode(mode === 'bin' ? 'dec' : 'bin')">⇄</button>
      <div class="mode-divider"></div>
      <button class="mode-btn" id="btnDec" onclick="setMode('dec')">Decimal → Binary</button>
    </div>

    <div class="input-area">
      <p class="label" id="modeLabel">Hint</p>
      <input type="text" id="mainInput" placeholder="Try : 101" maxlength="16" autocomplete="off" spellcheck="false" />
      <div class="err" id="errMsg"></div>
    </div>

    <div class="bits-strip" id="bitsStrip"><span class="empty-hint">_ _ _ _</span></div>

    <p class="result-label" id="resultLabel">Result</p>
    <div class="result-wrap" id="resultWrap">
      <div id="resultInner"></div>
      <button class="copy-btn" id="copyBtn" onclick="copyResult()">copy</button>
    </div>
    <div class="breakdown" id="breakdown"></div>
  </div>

  <!-- ══ QUIZ ══ -->
  <div class="section" id="tab-quiz">
    <div id="quiz-idle">
      <p style="color:var(--muted);font-size:13px;margin-bottom:1.5rem;font-family:'Libre Baskerville',serif;font-style:italic;">A binary number appears. Type the decimal answer. Score as many as you can before time runs out.</p>
      
      <p style="font-size:11px;color:var(--muted);letter-spacing:0.1em;margin-bottom:0.6rem;">DIFFICULTY (bits)</p>
      <div style="display:flex;gap:8px;margin-bottom:1.5rem;">
        <button class="quiz-start-btn diff-btn active" onclick="setDiff(this,4)" style="flex:1;padding:8px 4px;font-size:11px;">4-bit<br><span style="font-size:10px;opacity:0.6">0–15</span></button>
        <button class="quiz-start-btn diff-btn" onclick="setDiff(this,8)" style="flex:1;padding:8px 4px;font-size:11px;">8-bit<br><span style="font-size:10px;opacity:0.6">0–255</span></button>
        <button class="quiz-start-btn diff-btn" onclick="setDiff(this,12)" style="flex:1;padding:8px 4px;font-size:11px;">12-bit<br><span style="font-size:10px;opacity:0.6">0–4095</span></button>
        <button class="quiz-start-btn diff-btn" onclick="setDiff(this,16)" style="flex:1;padding:8px 4px;font-size:11px;">16-bit<br><span style="font-size:10px;opacity:0.6">0–65535</span></button>
      </div>

      <p style="font-size:11px;color:var(--muted);letter-spacing:0.1em;margin-bottom:0.6rem;">TIME</p>
      <div style="display:flex;gap:12px;margin-bottom:2rem;">
        <button class="quiz-start-btn" style="flex:1" onclick="startQuiz(60)">1 minute</button>
        <button class="quiz-start-btn" style="flex:1" onclick="startQuiz(120)">2 minutes</button>
      </div>
    </div>

    <div id="quiz-active" style="display:none">
      <div class="quiz-header">
        <div class="quiz-stat"><div class="quiz-stat-val" id="qScore">0</div><div class="quiz-stat-label">SCORE</div></div>
        <div class="timer-ring">
          <svg width="64" height="64" viewBox="0 0 64 64">
            <circle class="timer-bg" cx="32" cy="32" r="28"/>
            <circle class="timer-fg" id="timerCircle" cx="32" cy="32" r="28" stroke-dasharray="175.9" stroke-dashoffset="0"/>
          </svg>
          <div class="timer-text" id="timerText">60</div>
        </div>
        <div class="quiz-stat"><div class="quiz-stat-val" id="qStreak">0</div><div class="quiz-stat-label">STREAK</div></div>
      </div>

      <div class="quiz-question">
        <p class="quiz-q-label">What is this in decimal?</p>
        <div class="quiz-q-num" id="quizQ">—</div>
      </div>

      <div class="quiz-input-row">
        <input type="text" class="quiz-input" id="quizInput" placeholder="?" maxlength="10" autocomplete="off" />
        <button class="quiz-submit" onclick="submitQuiz()">check →</button>
      </div>
      <div class="quiz-feedback" id="quizFeedback"></div>
    </div>

    <div id="quiz-over" style="display:none" class="quiz-over">
      <div class="quiz-over-score" id="finalScore">0</div>
      <div class="quiz-over-label">CORRECT ANSWERS</div>
      <div style="font-size:13px;color:var(--muted);margin-bottom:2rem;">Best streak: <span id="finalStreak" style="color:var(--accent)">0</span></div>
      <button class="quiz-start-btn" onclick="resetQuiz()">play again</button>
    </div>
  </div>

  <!-- ══ CALCULATOR ══ -->
  <div class="section" id="tab-calc">
    <p class="calc-title">Binary Math</p>

    <div class="calc-mode-row">
      <button class="calc-mode-btn active" id="cBtnNorm" onclick="setCalcMode('normal')">Normal</button>
      <div class="mode-divider"></div>
      <button class="calc-mode-btn" id="cBtnBin" onclick="setCalcMode('binary')">Binary</button>
    </div>

    <div class="calc-display">
      <div class="calc-expr" id="calcExpr"></div>
      <div class="calc-val" id="calcVal">0</div>
    </div>
    <div class="calc-also" id="calcAlso"></div>

    <div class="calc-grid" id="calcGrid"></div>
  </div>

</div>

<script>
// ─── THEME ───
let isLight = false;
function toggleTheme() {
  isLight = !isLight;
  document.body.classList.toggle('light', isLight);
  document.getElementById('themeBtn').textContent = isLight ? '☾' : '☀';
}

// ─── TABS ───
function showTab(name) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  const tabs = ['decoder','quiz','calc'];
  document.querySelectorAll('.nav-tab')[tabs.indexOf(name)].classList.add('active');
}

// ─── DECODER ───
let mode = 'bin';
const mainInput   = document.getElementById('mainInput');
const bitsStrip   = document.getElementById('bitsStrip');
const errMsg      = document.getElementById('errMsg');
const resultLabel = document.getElementById('resultLabel');
const resultWrap  = document.getElementById('resultWrap');
const resultInner = document.getElementById('resultInner');
const breakdown   = document.getElementById('breakdown');
const modeLabel   = document.getElementById('modeLabel');

function setMode(m) {
  mode = m;
  mainInput.value = '';
  errMsg.textContent = '';
  bitsStrip.innerHTML = '<span class="empty-hint">_ _ _ _</span>';
  resultLabel.style.display = 'none';
  resultWrap.style.display = 'none';
  breakdown.innerHTML = '';
  document.getElementById('btnBin').classList.toggle('active', m === 'bin');
  document.getElementById('btnDec').classList.toggle('active', m === 'dec');
  mainInput.placeholder = m === 'bin' ? 'Try : 101' : 'Try : 5';
  modeLabel.textContent = 'Hint';
  mainInput.focus();
}

mainInput.addEventListener('keypress', e => {
  if (mode === 'bin') { if (e.key !== '0' && e.key !== '1') e.preventDefault(); }
  else { if (!/[0-9]/.test(e.key)) e.preventDefault(); }
});
mainInput.addEventListener('input', decode);

let lastResultText = '';

function decode() {
  const raw = mainInput.value.trim();
  errMsg.textContent = '';
  if (!raw) {
    bitsStrip.innerHTML = '<span class="empty-hint">_ _ _ _</span>';
    resultLabel.style.display = 'none';
    resultWrap.style.display = 'none';
    breakdown.innerHTML = '';
    return;
  }
  if (mode === 'bin') decodeBinary(raw);
  else decodeDecimal(raw);
}

function showResult() {
  resultLabel.style.display = 'block';
  resultWrap.style.display = 'block';
}

function makeBitCol(b, power, delay) {
  const col = document.createElement('div');
  col.className = 'bit-col';
  col.style.animationDelay = delay + 's';
  const el = document.createElement('div');
  el.className = 'bit ' + (b === '1' ? 'one' : 'zero');
  el.textContent = b;
  const pw = document.createElement('div');
  pw.className = 'bit-power' + (b === '1' ? ' active' : '');
  pw.textContent = Math.pow(2, power);
  col.appendChild(el); col.appendChild(pw);
  return col;
}

function decodeBinary(raw) {
  const bits = raw.split(''), n = bits.length;
  bitsStrip.innerHTML = '';
  let total = 0;
  const activeVals = [];
  bits.forEach((b, i) => {
    const power = n - 1 - i;
    const val = parseInt(b) * Math.pow(2, power);
    total += val;
    bitsStrip.appendChild(makeBitCol(b, power, i * 0.025));
    if (b === '1') activeVals.push(val);
  });
  lastResultText = String(total);
  showResult();
  resultInner.innerHTML = `<div class="result-num">${total}</div>`;
  renderBreakdown(activeVals, total);
}

function decodeDecimal(raw) {
  const num = parseInt(raw, 10);
  if (isNaN(num) || num < 0) {
    errMsg.textContent = 'positive numbers only';
    bitsStrip.innerHTML = '';
    resultLabel.style.display = 'none'; resultWrap.style.display = 'none'; breakdown.innerHTML = '';
    return;
  }
  const binStr = num === 0 ? '0' : num.toString(2);
  const bits = binStr.split('');
  bitsStrip.innerHTML = '';
  bits.forEach((b, i) => bitsStrip.appendChild(makeBitCol(b, bits.length - 1 - i, i * 0.025)));
  lastResultText = binStr;
  showResult();
  resultInner.innerHTML = `<div class="result-binary">${binStr}</div>`;
  const activeVals = bits.map((b,i) => b==='1' ? Math.pow(2, bits.length-1-i) : null).filter(Boolean);
  renderBreakdown(activeVals, num);
}

function renderBreakdown(activeVals, total) {
  breakdown.innerHTML = '';
  if (activeVals.length <= 1) return;
  const expr = document.createElement('div'); expr.className = 'sum-expr';
  activeVals.forEach((v, i) => {
    const s = document.createElement('span'); s.className = 'sum-val'; s.textContent = v; expr.appendChild(s);
    if (i < activeVals.length - 1) { const op = document.createElement('span'); op.className = 'sum-op'; op.textContent = '+'; expr.appendChild(op); }
  });
  const line = document.createElement('div'); line.className = 'sum-eq';
  const tot = document.createElement('span'); tot.className = 'sum-total'; tot.textContent = '= ' + total;
  breakdown.appendChild(expr); breakdown.appendChild(line); breakdown.appendChild(tot);
}

function copyResult() {
  if (!lastResultText) return;
  navigator.clipboard.writeText(lastResultText).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = 'copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'copy'; btn.classList.remove('copied'); }, 1500);
  });
}

// ─── QUIZ ───
let quizTimer = null, quizTimeLeft = 0, quizTotalTime = 60;
let quizScore = 0, quizStreak = 0, quizBestStreak = 0;
let quizAnswer = 0, quizBits = 4;

function setDiff(btn, bits) {
  quizBits = bits;
  document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function startQuiz(duration) {
  quizTotalTime = duration;
  quizTimeLeft = duration;
  quizScore = 0; quizStreak = 0; quizBestStreak = 0;
  document.getElementById('quiz-idle').style.display = 'none';
  document.getElementById('quiz-over').style.display = 'none';
  document.getElementById('quiz-active').style.display = 'block';
  document.getElementById('qScore').textContent = 0;
  document.getElementById('qStreak').textContent = 0;
  document.getElementById('quizFeedback').textContent = '';
  document.getElementById('timerText').textContent = duration;
  document.getElementById('timerCircle').style.strokeDashoffset = 0;
  document.getElementById('timerCircle').style.stroke = 'var(--accent)';
  nextQuestion();
  quizTimer = setInterval(tickQuiz, 1000);
  const qi = document.getElementById('quizInput');
  qi.value = ''; qi.focus();
}

function tickQuiz() {
  quizTimeLeft--;
  const pct = quizTimeLeft / quizTotalTime;
  const circ = 175.9;
  document.getElementById('timerCircle').style.strokeDashoffset = circ * (1 - pct);
  document.getElementById('timerText').textContent = quizTimeLeft;
  if (pct < 0.25) document.getElementById('timerCircle').style.stroke = '#e06060';
  else if (pct < 0.5) document.getElementById('timerCircle').style.stroke = '#f5c842';
  if (quizTimeLeft <= 0) endQuiz();
}

function nextQuestion() {
  const max = Math.pow(2, quizBits);
  let n = 0;
  while (n === 0) n = Math.floor(Math.random() * max);
  quizAnswer = n;
  document.getElementById('quizQ').textContent = n.toString(2);
  document.getElementById('quizInput').value = '';
  document.getElementById('quizFeedback').textContent = '';
  document.getElementById('quizFeedback').className = 'quiz-feedback';
}

function submitQuiz() {
  const val = parseInt(document.getElementById('quizInput').value.trim(), 10);
  const fb = document.getElementById('quizFeedback');
  if (isNaN(val)) { fb.textContent = 'enter a number'; fb.className = 'quiz-feedback wrong'; return; }
  if (val === quizAnswer) {
    quizScore++; quizStreak++;
    if (quizStreak > quizBestStreak) quizBestStreak = quizStreak;
    fb.textContent = '✓ correct!'; fb.className = 'quiz-feedback correct';
    document.getElementById('qScore').textContent = quizScore;
    document.getElementById('qStreak').textContent = quizStreak;
    setTimeout(nextQuestion, 500);
  } else {
    quizStreak = 0;
    fb.textContent = '✗ answer was ' + quizAnswer; fb.className = 'quiz-feedback wrong';
    document.getElementById('qStreak').textContent = 0;
    setTimeout(nextQuestion, 900);
  }
}

document.getElementById('quizInput').addEventListener('keypress', e => {
  if (!/[0-9]/.test(e.key)) e.preventDefault();
});
document.getElementById('quizInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') submitQuiz();
});

function endQuiz() {
  clearInterval(quizTimer);
  document.getElementById('quiz-active').style.display = 'none';
  document.getElementById('quiz-over').style.display = 'block';
  document.getElementById('finalScore').textContent = quizScore;
  document.getElementById('finalStreak').textContent = quizBestStreak;
}

function resetQuiz() {
  document.getElementById('quiz-over').style.display = 'none';
  document.getElementById('quiz-idle').style.display = 'block';
}

// ─── CALCULATOR ───
let calcMode = 'normal';
let calcExpression = ''; // full expression string user is building
let calcResult = '0';
let calcJustEvaled = false;

function setCalcMode(m) {
  calcMode = m;
  calcExpression = ''; calcResult = '0'; calcJustEvaled = false;
  document.getElementById('cBtnNorm').classList.toggle('active', m === 'normal');
  document.getElementById('cBtnBin').classList.toggle('active', m === 'binary');
  renderCalc();
  buildCalcGrid();
}

function buildCalcGrid() {
  const grid = document.getElementById('calcGrid');
  grid.innerHTML = '';
  const isBin = calcMode === 'binary';
  const btns = isBin
    ? [
        ['C','dim','clear'], ['←','dim','back'], ['(','dim','paren-open'], ['÷','op','op-div'],
        ['','',''],  ['','',''],  ['','',''],  ['×','op','op-mul'],
        ['','',''],  ['','',''],  ['1','','d-1'], ['-','op','op-sub'],
        ['','',''],  ['0','','d-0'], [')','dim','paren-close'], ['+','op','op-add'],
        ['00','wide dim','d-00'], ['',''], ['=','eq','eq'],
      ]
    : [
        ['C','dim','clear'], ['←','dim','back'], ['(','dim','paren-open'], ['÷','op','op-div'],
        ['7','','d-7'], ['8','','d-8'], ['9','','d-9'], ['×','op','op-mul'],
        ['4','','d-4'], ['5','','d-5'], ['6','','d-6'], ['-','op','op-sub'],
        ['1','','d-1'], ['2','','d-2'], ['3','','d-3'], ['+','op','op-add'],
        ['0','wide','d-0'], ['.','dim','dot'], ['=','eq','eq'],
        [')','dim wide','paren-close'], ['',''], ['',''],
      ];

  btns.forEach(([label, cls, action]) => {
    if (!label && !action) { const empty = document.createElement('div'); grid.appendChild(empty); return; }
    const btn = document.createElement('button');
    btn.className = 'calc-btn ' + (cls || '');
    btn.textContent = label;
    btn.onclick = () => calcPress(action, label);
    grid.appendChild(btn);
  });
}

// Convert display ops to JS-evaluable ops
function toJsExpr(expr) {
  return expr.replace(/×/g, '*').replace(/÷/g, '/');
}

// Tokenize and evaluate with full PEMDAS/BODMAS (×÷ before +-)
function evalExpr(expr) {
  try {
    const jsExpr = toJsExpr(expr);
    // Safe eval using Function
    const result = Function('"use strict"; return (' + jsExpr + ')')();
    if (!isFinite(result)) return null;
    return Math.round(result * 1e10) / 1e10;
  } catch(e) { return null; }
}

function getLastToken() {
  // Returns the last number token being typed
  const match = calcExpression.match(/[\d.]+$/);
  return match ? match[0] : null;
}

function calcPress(action, label) {
  const ops = {'op-add':'+', 'op-sub':'-', 'op-mul':'×', 'op-div':'÷'};
  const opSymbols = ['+','-','×','÷'];

  if (action === 'clear') {
    calcExpression = ''; calcResult = '0'; calcJustEvaled = false;
  }
  else if (action === 'back') {
    if (calcJustEvaled) { calcExpression = ''; calcResult = '0'; calcJustEvaled = false; }
    else calcExpression = calcExpression.slice(0, -1);
  }
  else if (action === 'paren-open') {
    if (calcJustEvaled) { calcExpression = '('; calcJustEvaled = false; }
    else calcExpression += '(';
  }
  else if (action === 'paren-close') {
    calcExpression += ')';
  }
  else if (action === 'dot') {
    if (calcJustEvaled) { calcExpression = '0.'; calcJustEvaled = false; }
    else {
      const last = getLastToken();
      if (!last || last.includes('.')) return;
      calcExpression += '.';
    }
  }
  else if (action.startsWith('d-')) {
    const digit = action.slice(2);
    if (calcJustEvaled) { calcExpression = digit; calcJustEvaled = false; }
    else calcExpression += digit;
  }
  else if (action.startsWith('op-')) {
    const sym = ops[action];
    if (calcJustEvaled) { calcJustEvaled = false; }
    // Replace trailing operator if there is one
    const lastChar = calcExpression.slice(-1);
    if (opSymbols.includes(lastChar)) {
      calcExpression = calcExpression.slice(0,-1) + sym;
    } else {
      calcExpression += sym;
    }
  }
  else if (action === 'eq') {
    if (!calcExpression) return;
    // For binary mode, convert binary tokens to decimal before eval
    let evalStr = calcExpression;
    if (calcMode === 'binary') {
      evalStr = evalStr.replace(/[01]+/g, m => parseInt(m, 2));
    }
    const res = evalExpr(evalStr);
    if (res !== null) {
      const displayRes = calcMode === 'binary' ? Math.round(res).toString(2) : String(res);
      calcResult = displayRes;
      calcJustEvaled = true;
    } else {
      calcResult = 'error';
      calcJustEvaled = true;
    }
  }

  // Live preview while typing
  if (!calcJustEvaled && calcExpression) {
    let evalStr = calcExpression;
    if (calcMode === 'binary') evalStr = evalStr.replace(/[01]+/g, m => parseInt(m, 2));
    const preview = evalExpr(evalStr);
    if (preview !== null) {
      calcResult = calcMode === 'binary' ? Math.round(preview).toString(2) : String(preview);
    }
  } else if (!calcJustEvaled) {
    calcResult = '0';
  }

  renderCalc();
}

function renderCalc() {
  document.getElementById('calcExpr').textContent = calcExpression || '';
  document.getElementById('calcVal').textContent = calcJustEvaled ? calcResult : (calcResult !== '0' ? calcResult : (calcExpression ? calcResult : '0'));
  const also = document.getElementById('calcAlso');
  const val = calcResult;
  if (calcMode === 'binary') {
    const dec = parseInt(val, 2);
    also.textContent = (!isNaN(dec) && val !== '0') ? '= ' + dec + ' in decimal' : '';
  } else {
    const n = parseFloat(val);
    if (!isNaN(n) && Number.isInteger(n) && n >= 0 && n < 65536) {
      also.textContent = '= ' + n.toString(2) + ' in binary';
    } else { also.textContent = ''; }
  }
}

// init
buildCalcGrid();
renderCalc();

// ─── GLOBAL KEYBOARD ───
document.addEventListener('keydown', e => {
  // Only fire when calculator tab is active and no input is focused
  const activeTab = document.querySelector('.section.active');
  if (!activeTab || activeTab.id !== 'tab-calc') return;
  if (document.activeElement && document.activeElement.tagName === 'INPUT') return;

  const isBin = calcMode === 'binary';
  const key = e.key;

  if (key >= '0' && key <= '9') {
    if (isBin && key !== '0' && key !== '1') return;
    e.preventDefault();
    calcPress('d-' + key, key);
  } else if (key === '+') { e.preventDefault(); calcPress('op-add', '+'); }
  else if (key === '-') { e.preventDefault(); calcPress('op-sub', '-'); }
  else if (key === '*') { e.preventDefault(); calcPress('op-mul', '×'); }
  else if (key === '/') { e.preventDefault(); calcPress('op-div', '÷'); }
  else if (key === '(') { e.preventDefault(); calcPress('paren-open', '('); }
  else if (key === ')') { e.preventDefault(); calcPress('paren-close', ')'); }
  else if (key === '.') { if (!isBin) { e.preventDefault(); calcPress('dot', '.'); } }
  else if (key === 'Enter' || key === '=') { e.preventDefault(); calcPress('eq', '='); }
  else if (key === 'Backspace') { e.preventDefault(); calcPress('back', '←'); }
  else if (key === 'Escape' || key === 'c' || key === 'C') { e.preventDefault(); calcPress('clear', 'C'); }
});
</script>
